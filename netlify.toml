[build]
  command = "npm ci && npm run build"
  publish = "dist"

[build.environment]
  NETLIFY = "true"
  PDF_RESOLVER_VERSION = "3"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions."api"]
  timeout = 26
  external_node_modules = ["express", "cors"]
  included_files = ["server/**"]

# API routes → Netlify Function (must be before SPA catch-all)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200
  force = true

# SPA routing — React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
